<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Centered Image</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#111;
    overflow:hidden;
}

.center-image{
    width:350px;
    max-width:90%;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,0.4);
    transition:0.3s ease;
}

.center-image:hover{
    transform:scale(1.05);
}
</style>

</head>
<body>

<img src="img.jpeg" alt="Centered Image" class="center-image">

</body>
</html>
